<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Key Box - Carpark Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-container">
    <div class="page-header">
      <h2><i class="bi bi-key-fill me-2"></i>Key Box</h2>
      <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-success" id="btn-add-key"><i class="bi bi-plus-lg me-1"></i>Add Key</button>
        <span class="badge bg-success fs-6 align-self-center" id="available-count">-- Available</span>
        <span class="badge bg-danger fs-6 align-self-center" id="inuse-count">-- In Use</span>
      </div>
    </div>

    <!-- Legend -->
    <div class="d-flex gap-3 mb-3 p-3 bg-white rounded shadow-sm">
      <div class="d-flex align-items-center gap-2">
        <div class="key-item available" style="width:40px; height:30px; display:flex; align-items:center; justify-content:center;">K</div>
        <span class="small">Available</span>
      </div>
      <div class="d-flex align-items-center gap-2">
        <div class="key-item in-use" style="width:40px; height:30px; display:flex; align-items:center; justify-content:center;">K</div>
        <span class="small">In Use</span>
      </div>
      <div class="small text-muted ms-auto"><i class="bi bi-cursor-fill me-1"></i>Click an in-use key to open the booking</div>
    </div>

    <div id="key-grid" class="key-grid">
      <div class="text-center py-4 text-muted col-span-all"><div class="spinner-border"></div></div>
    </div>
  </div>

  <!-- Key Detail Modal -->
  <div class="modal fade" id="keyModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="key-modal-title">Key Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="key-modal-body">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <a href="#" class="btn btn-primary" id="key-invoice-link">View Invoice</a>
          <button type="button" class="btn btn-outline-success" id="btn-release-key">Release Key</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Key Modal -->
  <div class="modal fade" id="addKeyModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add New Key</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <label class="form-label">Key Number</label>
          <input type="number" class="form-control" id="new-key-number" placeholder="51">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-success" id="btn-save-new-key">Add Key</button>
        </div>
      </div>
    </div>
  </div>

  <div id="alert-container" class="alert-banner"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/common.js"></script>
  <script>
    document.getElementById('navbar-container').innerHTML = renderNavbar('keybox');

    let currentKey = null;

    async function loadKeyBox() {
      const res = await fetch('/api/keybox');
      if (!res.ok) return;
      const data = await res.json();

      document.getElementById('available-count').textContent = `${data.available} Available`;
      document.getElementById('inuse-count').textContent = `${data.inUse} In Use`;

      const grid = document.getElementById('key-grid');
      grid.innerHTML = data.keys.map(k => `
        <div class="key-item ${k.status}" data-key='${JSON.stringify(k).replace(/'/g, "&#39;")}' 
             title="${k.status === 'in_use' ? `In use: ${k.first_name||''} ${k.last_name||''} - ${k.rego||''}` : 'Available'}">
          <span class="key-num">${k.key_number}</span>
          ${k.status === 'in_use' ? `<span class="key-name">${(k.last_name||'').substring(0,8) || 'In Use'}</span>` : `<span class="key-name text-muted">Free</span>`}
        </div>
      `).join('');

      // Clicking an in-use key goes straight to its invoice
      document.querySelectorAll('.key-item.in-use').forEach(el => {
        el.style.cursor = 'pointer';
        el.addEventListener('click', () => {
          try {
            const k = JSON.parse(el.dataset.key.replace(/&#39;/g, "'"));
            if (k.invoice_id) {
              window.location.href = `/invoice.html?id=${k.invoice_id}`;
            } else {
              // No linked invoice — fall back to detail modal
              showKeyDetail(k);
            }
          } catch(e) {}
        });
      });
    }

    function showKeyDetail(k) {
      currentKey = k;
      document.getElementById('key-modal-title').textContent = `Key #${k.key_number}`;
      document.getElementById('key-modal-body').innerHTML = k.invoice_number ? `
        <table class="table table-sm">
          <tr><th>Invoice #</th><td><strong>${k.invoice_number}</strong></td></tr>
          <tr><th>Customer</th><td>${k.first_name||''} ${k.last_name||''}</td></tr>
          <tr><th>Rego</th><td><strong>${k.rego||''}</strong></td></tr>
          <tr><th>Return Date</th><td>${k.return_date ? formatDateShort(k.return_date) : 'Unknown'}</td></tr>
          <tr><th>Status</th><td><span class="badge bg-danger">In Use</span></td></tr>
        </table>
      ` : `<p class="text-muted">Key in use but no linked invoice found.</p>`;

      const invLink = document.getElementById('key-invoice-link');
      if (k.invoice_id) {
        invLink.href = `/invoice.html?id=${k.invoice_id}`;
        invLink.style.display = 'inline-block';
      } else {
        invLink.style.display = 'none';
      }

      new bootstrap.Modal('#keyModal').show();
    }

    document.getElementById('btn-release-key').addEventListener('click', async () => {
      if (!currentKey) return;
      if (!confirm(`Release Key #${currentKey.key_number}?`)) return;
      const res = await fetch(`/api/keybox/${currentKey.key_number}/release`, { method: 'POST' });
      if (res.ok) {
        showAlert(`Key #${currentKey.key_number} released`, 'success');
        bootstrap.Modal.getInstance('#keyModal').hide();
        loadKeyBox();
      }
    });

    document.getElementById('btn-add-key').addEventListener('click', () => {
      new bootstrap.Modal('#addKeyModal').show();
    });

    document.getElementById('btn-save-new-key').addEventListener('click', async () => {
      const num = document.getElementById('new-key-number').value;
      if (!num) { showAlert('Enter a key number', 'warning'); return; }
      const res = await fetch('/api/keybox/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key_number: num })
      });
      if (res.ok) {
        showAlert(`Key #${num} added`, 'success');
        bootstrap.Modal.getInstance('#addKeyModal').hide();
        loadKeyBox();
      } else {
        const err = await res.json();
        showAlert(err.error || 'Error', 'danger');
      }
    });

    async function init() {
      await checkAuth();
      await loadKeyBox();
      updateNavCarsCount();
    }
    init();
  </script>
</body>
</html>
